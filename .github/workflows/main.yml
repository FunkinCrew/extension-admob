name: Testing
on:
  push:
    branches: master
    paths-ignore:
      - 'LICENSE'
      - 'README.md'
      - 'haxelib.json'
      - 'hxformat.json'
  pull_request:
  workflow_dispatch:
jobs:
  Android:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Setup Haxe
        uses: krdlab/setup-haxe@master
        with:
          haxe-version: 4.3.7

      - name: Install Haxe Libraries
        run: |
          haxelib git lime https://github.com/FunkinCrew/lime.git --quiet --never --skip-dependencies
          haxelib dev extension-admob .

      - name: Setup hxcpp Library
        run: haxelib git hxcpp https://github.com/FunkinCrew/hxcpp.git --quiet --never --skip-dependencies && haxelib run lime rebuild hxcpp

      - name: List Installed Haxe Libraries
        run: haxelib list

      - name: Rebuild MacOS libs
        run: haxelib run lime rebuild macos -release

      - name: Configure Environment
        run: |
          haxelib run lime config ANDROID_SDK $ANDROID_HOME
          haxelib run lime config ANDROID_NDK_ROOT $ANDROID_NDK_LATEST_HOME
          haxelib run lime config JAVA_HOME $JAVA_HOME_17_arm64
          haxelib run lime config ANDROID_SETUP true

      - name: Rebuild Android libs
        run: haxelib run lime rebuild android -release

      - name: Build
        run: cd example && haxelib run lime build android -debug

      - name: Upload Artifact
        uses: actions/upload-artifact@main
        with:
          name: androidBuild
          path: example/export/android/bin/app/build/outputs/apk/debug
          if-no-files-found: warn
  iOS:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Setup Haxe
        uses: krdlab/setup-haxe@master
        with:
          haxe-version: 4.3.7

      - name: Install Haxe Libraries
        run: |
          haxelib git lime https://github.com/FunkinCrew/lime.git --quiet --never --skip-dependencies
          haxelib dev extension-admob .

      - name: Setup hxcpp Library
        run: haxelib git hxcpp https://github.com/FunkinCrew/hxcpp.git --quiet --never --skip-dependencies && haxelib run lime rebuild hxcpp

      - name: List Installed Haxe Libraries
        run: haxelib list
  
      - name: Setup Frameworks
        run: haxelib run extension-admob setup

      - name: Rebuild Lime
        run: haxelib run lime rebuild macos -release && haxelib run lime rebuild ios -release

      - name: Build
        run: cd example && haxelib run lime build ios -nosign -release

      - name: Create IPA
        run: |
          cd example/export/ios/build/Release-iphoneos
          mkdir Payload
          mv *.app Payload
          zip -r Sample.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@main
        with:
          name: iOSBuild
          path: example/export/ios/build/Release-iphoneos/Sample.ipa
          if-no-files-found: warn
